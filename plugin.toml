[plugin]
name = "fledge-plugin-aps"
version = "1.0.0"
description = "Tiny Swift CLI that dogfoods AppState with a dynamic schema.json registry"
author = "0xLeif"

[[commands]]
name = "aps"
description = "Dogfood AppState: get/set/watch/dump registry-backed state"
binary = ".build/release/aps"

[hooks]
# Package.swift is auto-detected; portable wrapper handles Linux linker flags.
build = "./Scripts/build.sh -c release"

[capabilities]
exec = false
store = false
metadata = false
