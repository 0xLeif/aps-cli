name: Linux smoke

# Linux coverage now lives in the CI matrix (ci.yml). This workflow remains as a
# lightweight duplicate so existing required checks named "Linux smoke" keep
# green while branch protection is updated to the CI matrix cells.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: linux-smoke-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  linux-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Swift version
        run: swift --version

      - name: Test (debug)
        # Portable wrapper adds Linux -Xlinker --allow-shlib-undefined for the
        # Observation toolchain bug on 6.0.x.
        run: ./Scripts/test.sh

      - name: Test parallel (isolation regression)
        run: ./Scripts/test-parallel.sh

      - name: Smoke CLI
        env:
          APS_BIN: .build/debug/aps
        run: ./Scripts/smoke.sh

      - name: CI dogfood (use aps as a job-scoped helper)
        env:
          APS_BIN: .build/debug/aps
        run: ./Scripts/ci-dogfood.sh
