name: Linux smoke

# GitHub-hosted Linux build + smoke for the 0.x agent-ready milestone.
# Complements the private-repo macOS self-hosted CI/Trust workflows.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: linux-smoke-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  linux-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Swift version
        run: swift --version

      - name: Test (debug)
        # libswiftObservation.so has an undefined swift::threading::fatal ref on
        # Linux 6.0.x toolchains; tolerate it at the shared-lib link (same as the
        # executable's default). Verified in swift:6.0.3-noble containers.
        run: swift test -Xlinker --allow-shlib-undefined

      - name: Smoke CLI
        env:
          APS_BIN: .build/debug/aps
        run: ./Scripts/smoke.sh
