name: CI

# GitHub-hosted macOS runner (public-ready). Keep linux/windows smokes separate.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  build-test-smoke:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Test (release)
        run: swift test -c release
      - name: Smoke CLI
        env:
          APS_BIN: .build/release/aps
        run: ./Scripts/smoke.sh
