name: CI

# GitHub-hosted macOS + Linux matrix. Either platform failure fails this workflow.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  build-test-smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            swift_setup: false
            configuration: release
            aps_bin: .build/release/aps
          - os: ubuntu-latest
            swift_setup: true
            configuration: debug
            aps_bin: .build/debug/aps
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift
        if: matrix.swift_setup
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Swift version
        run: swift --version

      - name: Test
        run: ./Scripts/test.sh -c ${{ matrix.configuration }}

      - name: Test parallel (isolation regression)
        run: ./Scripts/test-parallel.sh
        env:
          APS_TEST_WORKERS: "4"

      - name: Smoke CLI
        env:
          APS_BIN: ${{ matrix.aps_bin }}
        run: ./Scripts/smoke.sh
