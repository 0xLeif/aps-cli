name: Windows smoke

# GitHub-hosted Windows test + PowerShell smoke (#45, #46).
# Complements macOS self-hosted CI and linux-smoke.yml.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: windows-smoke-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  windows-smoke:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Swift 6.0.x hits a known ucrt/_Builtin_intrinsics cycle on Windows SDK 10.0.26100.
      # Pin a post-fix toolchain (6.3.1+) for windows-latest only; macOS/Linux stay on 6.0.
      - name: Install Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3.1"

      - name: Swift version
        shell: pwsh
        run: swift --version

      - name: Test (debug)
        shell: pwsh
        run: swift test

      - name: Smoke CLI
        shell: pwsh
        env:
          APS_BIN: .build/debug/aps.exe
        run: ./Scripts/smoke.ps1
