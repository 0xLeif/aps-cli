name: Linux

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1.0"
      - name: Build
        run: swift build -c release
      - name: Test
        run: swift test
      - name: Smoke CLI
        env:
          APS_BIN: .build/release/aps
        run: ./Scripts/smoke.sh
