# fledge.toml: aps CLI lifecycle tasks
# Docs: https://github.com/CorvidLabs/fledge

[tasks]
build = "./Scripts/build.sh"
test = "./Scripts/test.sh"
test-parallel = "./Scripts/test-parallel.sh"
release-build = "./Scripts/build.sh -c release"
smoke = "./Scripts/smoke.sh"
# Use aps as a CI helper under a job-scoped APS_HOME (not only smoke the binary).
ci-dogfood = "./Scripts/ci-dogfood.sh"
# Manifest-only: warns if `.build/release/aps` is missing (created by release/install hooks).
plugin-validate = "fledge plugins validate ."
# Keep specsync out of lanes.verify: Trust/SpecSync run it as a top-level gate
# so verification commands cannot recurse into specsync check.
spec = "specsync check"
check = "fledge run build && fledge run test && fledge run test-parallel && fledge run smoke && fledge run plugin-validate && fledge run spec"

[lanes.verify]
description = "Native quality gate (build, test, parallel isolation, smoke, ci-dogfood, plugin manifest)"
steps = ["build", "test", "test-parallel", "smoke", "ci-dogfood", "plugin-validate"]
